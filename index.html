<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Selvakumar! 🎂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1e0050 0%, #6a0080 50%, #ff4fa0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    padding: 20px;
  }
  .title {
    color: #ffe854;
    font-size: 2rem;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #ff80c0;
    animation: pulse 2s ease-in-out infinite;
  }
  .subtitle {
    color: #ffcce8;
    font-size: 1rem;
    margin-bottom: 24px;
    text-align: center;
  }
  .sticker-img {
    width: 100%;
    max-width: 400px;
    border-radius: 20px;
    box-shadow: 0 0 40px #ff60b0aa;
    animation: float 3s ease-in-out infinite;
  }
  .footer {
    margin-top: 24px;
    color: #ff9ecc;
    font-size: 0.9rem;
    text-align: center;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  .emoji-row {
    font-size: 1.8rem;
    margin: 16px 0;
    letter-spacing: 8px;
    animation: pulse 1.5s ease-in-out infinite;
  }
</style>
</head>
<body>
  <div class="title">🎂 Happy Birthday Selvakumar! 🎉</div>
  <div class="subtitle">A special wish just for you 💖</div>
  <img class="sticker-img" src="selvakumar_birthday_sticker.png" alt="Birthday Sticker for Selvakumar" />
  <div class="emoji-row">🎈 🎁 ✨ 🎊 🎈</div>
  <div class="footer">~ With Love, Your Loving Sister 💖 ~</div>
</body>
</html>
